[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "migrations"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008", "UP007"]  # B008: FastAPI Depends() in defaults is intentional

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
